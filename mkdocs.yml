site_name: v3xctrl Wiki
site_url: https://wiki.v3xctrl.com/
repo_url: https://github.com/v3xctrl/wiki
repo_name: v3xctrl/wiki
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
      toc_depth: 3
  - tables

nav:
  - Getting Started:
    - Quickstart: index.md
    - Shopping List: Shopping-List.md
    - Terminology: Terminology.md
    - Motivation: Motivation.md
  - Streamer:
    - Streamer: Streamer.md
    - Web Interface: Web-Interface.md
    - Pinout: Pinout.md
    - Compatible Hardware: Hardware.md
    - Modems: Modems.md
    - SIM: SIM.md
    - Antennas: Antennas.md
    - Calibration: Calibration.md
    - UART: UART.md
    - Tuning Encoder Settings: Tuning-encoder-settings.md
  - Viewer:
    - Viewer: Viewer.md
    - Video Receiver Backends: Video-Receiver-Backends.md
    - Controller Setup: Controller-Setup.md
    - Input Devices: Input-devices.md
  - Networking:
    - Connection Types: Connection-Types.md
    - Network Testing: Network-Testing.md
    - Latency: Latency.md
    - Control Channel: Control-Channel.md
    - Carriers: Carriers.md
  - Troubleshooting:
    - Troubleshooting: Troubleshooting.md
    - FAQ: FAQ.md
    - Known Issues: Known-Issues.md
    - Limitations: Limitations.md
  - Development:
    - Development: Development.md
    - Release: x-Release.md
    - New Release Checklist: x-New-Release-Checklist.md
    - OS Update Checklist: x-OS-Update-Checklist.md
    - OS Benchmarks: x-OS-Benchmarks.md
